name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        run: docker build -t marvinlazo2003/backend ./backend

      - name: Build frontend image
        run: docker build -t marvinlazo2003/frontend ./frontend

      - name: Push backend
        run: docker push marvinlazo2003/backend

      - name: Push frontend
        run: docker push marvinlazo2003/frontend
